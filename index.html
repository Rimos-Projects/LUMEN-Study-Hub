<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LUMEN Study Hub</title>
<link rel="icon" href="https://i.imgur.com/GV5J9mB.png">

<style>
:root{
  --bg:#0f1116;
  --panel:rgba(255,255,255,0.06);
  --panel2:rgba(255,255,255,0.09);
  --text:#e6e6e6;
  --muted:#9aa0a6;
  --accent:#3b82f6;
  --radius:14px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:var(--panel);
  backdrop-filter: blur(20px);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:12px;
  overflow:auto;
}

.logo{
  font-size:20px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:8px;
}

.group{margin-top:10px;}
.group-title{
  font-size:10px;
  color:var(--muted);
  margin-bottom:6px;
  text-transform:uppercase;
}

.nav-btn{
  width:100%;
  padding:10px;
  margin-bottom:6px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;
  color:var(--text);
  text-align:left;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:14px;
  overflow:hidden;
}

.section{display:none;}
.section.active{display:block;}

.card{
  background:var(--panel);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border-radius:var(--radius);
  padding:12px;
  margin-bottom:10px;
}

/* INPUTS */
input, textarea, select{
  width:100%;
  padding:8px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:var(--text);
}

.btn{
  background:var(--accent);
  border:none;
  padding:8px 10px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  margin-top:6px;
}

/* TASK */
.task{
  display:flex;
  justify-content:space-between;
  padding:8px;
  margin-top:6px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
}

.task.done{opacity:0.5;text-decoration:line-through;}

/* TIMER */
.timer{font-size:40px;text-align:center;margin:10px 0;}
.floating{
  position:fixed;
  bottom:12px;
  right:12px;
  padding:8px;
  border-radius:10px;
  background:rgba(0,0,0,0.6);
  display:none;
}

/* CALENDAR */
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  margin-top:10px;
}
.day{
  background:rgba(255,255,255,0.05);
  padding:6px;
  border-radius:6px;
  font-size:12px;
  min-height:50px;
}
.event{
  font-size:10px;
  margin-top:2px;
  background:var(--accent);
  border-radius:4px;
  padding:2px;
}
</style>
</head>

<body>

<div class="floating" id="floatingTimer">25:00</div>

<div class="sidebar">
  <div class="logo">LUMEN</div>

  <div class="group">
    <div class="group-title">Principal</div>
    <button class="nav-btn" onclick="show('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="show('tasks')">Tareas</button>
    <button class="nav-btn" onclick="show('timer')">Temporizador</button>
    <button class="nav-btn" onclick="show('calendar')">Calendario</button>
  </div>

  <div class="group">
    <div class="group-title">Herramientas</div>
    <button class="nav-btn" onclick="show('notes')">Notas</button>
    <button class="nav-btn" onclick="show('stats')">Stats</button>
  </div>

  <div class="group">
    <div class="group-title">Sistema</div>
    <button class="nav-btn" onclick="show('settings')">Settings</button>
  </div>
</div>

<div class="main">

<div id="dashboard" class="section active">
  <div class="card"><h2>Dashboard</h2></div>
</div>

<div id="tasks" class="section">
  <div class="card">
    <h2>Tareas</h2>
    <input id="taskInput"/>
    <button class="btn" onclick="addTask()">Agregar</button>
    <div id="taskList"></div>
  </div>
</div>

<div id="timer" class="section">
  <div class="card">
    <h2>Temporizador</h2>
    <div class="timer" id="time">25:00</div>
    <button class="btn" onclick="start()">Start</button>
  </div>
</div>

<!-- CALENDARIO -->
<div id="calendar" class="section">
  <div class="card">
    <h2>Calendario</h2>

    <select id="viewMode" onchange="renderCalendar()">
      <option value="month">Mensual</option>
      <option value="week">Semanal</option>
      <option value="day">Diario</option>
    </select>

    <input id="eventTitle" placeholder="Evento"/>
    <input type="datetime-local" id="eventTime"/>
    <select id="notifyBefore">
      <option value="0">0 min</option>
      <option value="5">5 min</option>
      <option value="10">10 min</option>
      <option value="15">15 min</option>
    </select>

    <button class="btn" onclick="addEvent()">Agregar evento</button>

    <div id="calendarGrid" class="calendar-grid"></div>
  </div>
</div>

<div id="notes" class="section">
  <div class="card"><textarea id="note"></textarea></div>
</div>

<div id="stats" class="section">
  <div class="card">Stats</div>
</div>

<div id="settings" class="section">
  <div class="card">
    <input type="color" id="accent"/>
    <input type="number" id="minutes" value="25"/>
    <button class="btn" onclick="saveSettings()">Guardar</button>
  </div>
</div>

</div>

<script>

let events = JSON.parse(localStorage.getItem("events")||"[]");

/* NAV */
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* CALENDAR */
function addEvent(){
  let e={
    title:eventTitle.value,
    time:new Date(eventTime.value).getTime(),
    notify:Number(notifyBefore.value)
  };
  events.push(e);
  localStorage.setItem("events",JSON.stringify(events));
  renderCalendar();
}

function renderCalendar(){
  let grid=document.getElementById("calendarGrid");
  grid.innerHTML="";
  let mode=viewMode.value;

  let now=new Date();

  let days= mode==="month"?30 : mode==="week"?7 : 1;

  for(let i=0;i<days;i++){
    let d=new Date();
    d.setDate(now.getDate()+i);

    let div=document.createElement("div");
    div.className="day";
    div.innerHTML=`${d.getDate()}`;

    events.forEach(ev=>{
      let ed=new Date(ev.time);
      if(ed.toDateString()===d.toDateString()){
        let evDiv=document.createElement("div");
        evDiv.className="event";
        evDiv.innerText=ev.title;
        div.appendChild(evDiv);
      }
    });

    grid.appendChild(div);
  }
}

/* NOTIFICATIONS */
setInterval(()=>{
  let now=Date.now();

  events.forEach(ev=>{
    let trigger=ev.time - ev.notify*60000;
    if(now>=trigger && !ev.done){
      if(Notification.permission==="granted"){
        new Notification(ev.title);
      }
      ev.done=true;
      localStorage.setItem("events",JSON.stringify(events));
    }
  });
},1000);

if(Notification.permission!=="granted"){
  Notification.requestPermission();
}

renderCalendar();

</script>

</body>
</html>
